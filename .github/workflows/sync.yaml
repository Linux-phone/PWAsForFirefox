name: Upstream Sync

on:
  schedule:
    # Every Monday at 06:00 UTC; adjust or remove as needed
    - cron: '0 6 * * 1'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Open upstream sync PR
    # Only run on this fork, not on downstream forks of it
    if: github.repository == 'Linux-phone/PWAsForFirefox'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Update sync branch and open pull request
        env:
          # Using GITHUB_TOKEN keeps setup at zero, but PRs it opens do NOT trigger
          # the other workflows (CI). Swap to a PAT secret if you want CI to run on
          # the sync PR.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM: filips123/PWAsForFirefox
          SYNC_BRANCH: upstream-sync
        run: |
          set -euo pipefail

          # Fetch the latest upstream main
          git fetch "https://github.com/${UPSTREAM}.git" main

          # Skip if the fork already contains every upstream commit
          if git merge-base --is-ancestor FETCH_HEAD origin/main; then
            echo "Already up to date with ${UPSTREAM}; nothing to sync."
            exit 0
          fi

          # Leave any in-progress sync PR untouched so manual conflict resolution
          # on its branch is never clobbered by a force-push
          open_pr=$(gh pr list --head "${SYNC_BRANCH}" --base main --state open \
            --json number --jq '.[].number' | head -n1)
          if [ -n "${open_pr}" ]; then
            echo "Sync PR #${open_pr} is already open; finish or merge it first."
            exit 0
          fi

          # Point the sync branch at the latest upstream main and open a PR
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            FETCH_HEAD:refs/heads/${SYNC_BRANCH}

          body=$(cat <<'EOF'
          Automated sync of upstream `filips123/PWAsForFirefox` `main` into this fork.

          Review the diff and resolve any conflicts before merging. Use a **merge
          commit** (not squash) so the histories stay aligned for future syncs.
          EOF
          )

          gh pr create --base main --head "${SYNC_BRANCH}" \
            --title "Sync with upstream filips123/PWAsForFirefox" \
            --body "${body}"
